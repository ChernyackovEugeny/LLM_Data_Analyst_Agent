server {
    listen 80;

    # React SPA: все пути, которые не являются файлами, отдают index.html.
    # Это нужно для react-router — без этого прямые ссылки типа /dashboard дают 404.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # index.html не кэшируем: Vite хэширует имена JS/CSS-бандлов,
    # но если браузер закэшировал старый index.html — он грузит старые бандлы.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # API-запросы проксируем на бэкенд.
    # proxy_buffering off и proxy_cache off — критично для SSE (Server-Sent Events):
    # без этого nginx накапливает поток в буфере и фронтенд не получает события в реальном времени.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Статические файлы (графики matplotlib) раздаются через бэкенд FastAPI StaticFiles.
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Healthcheck эндпоинт — проксируем напрямую на бэкенд.
    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
